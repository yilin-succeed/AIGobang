<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋</title>
    <style>
        body{
            font-family:"Segoe UI",Roboto,Arial;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }
        
        /* 标题 */
        h1.title{
            font-size:48px;
            font-weight:700;
            margin-bottom:40px;
            color:white;
            letter-spacing:3px;
            text-shadow:0 0 10px rgba(0,150,255,0.6);
        }
        
        /* 卡片 */
        .container{
            width:360px;
            padding:30px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:left;
            color:white;
        }
        
        /* 标题 */
        .container h2{
            text-align:center;
            margin-bottom:25px;
        }
        
        /* 表单 */
        .form-group{
            margin-bottom:18px;
        }
        
        .form-group label{
            font-size:13px;
            opacity:0.9;
        }
        
        .form-group input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border-radius:8px;
            border:none;
            outline:none;
            font-size:14px;
        }
        
        /* 按钮 */
        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:linear-gradient(135deg,#00c6ff,#0072ff);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.25s;
        }
        
        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 15px rgba(0,0,0,0.4);
        }
        
        /* 切换 */
        .switch{
            margin-top:20px;
            text-align:center;
            font-size:14px;
        }
        
        .switch a{
            color:#00c6ff;
            cursor:pointer;
        }
        
        /* 成功提示 */
        #success-alert{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            background:#00c6ff;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            box-shadow:0 5px 20px rgba(0,0,0,0.4);
            display:none;
            font-weight:500;
        }
        #register-container{
            display:none;
        }
    </style>
</head>

<body>
    <div id="success-alert">提示信息</div>

    <!-- 精美标题 -->
    <h1 class="title">五子棋</h1>

    <!-- 登录界面 -->
    <div class="container" id="login-container">
        <h2>登录</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="switch">
            没有账号？<a onclick="showRegister()">去注册账号</a>
        </div>
    </div>

    <!-- 注册界面 -->
    <div class="container" id="register-container">
        <h2>注册</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">注册</button>
        </form>
        <div class="switch">
            已有账号？<a onclick="showLogin()">返回登录</a>
        </div>
    </div>

    <script>
        // 显示蓝色提示框
        function showAlert(message) {
            const alertBox = document.getElementById('success-alert');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 1000);
        }

        // 切换注册和登录界面
        function showRegister() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('register-container').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('register-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }

        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
                .then(response => {
                    // 先检查响应状态
                    if (response.status === 403) {
                        showAlert('账号已在其他地方登录！');
                        throw new Error('已在其他地方登录');
                    }
                    
                    // 检查其他状态和内容类型
                    const contentType = response.headers.get('content-type');
                    if (response.status === 200) {
                        if (contentType && contentType.includes('application/json')) {
                            return response.json();
                        } else {
                            throw new Error('返回格式错误');
                        }
                    } else if (response.status === 401) {
                        showAlert('账号或密码错误！');
                        throw new Error('认证失败');
                    } else {
                        throw new Error('请求失败');
                    }
                })
                .then(data => {
                    if (data && data.userId) {
                        sessionStorage.setItem('userId', data.userId);
                        showAlert('登录成功！');
                        // 使用重定向而不是fetch
                        window.location.href = '/menu';
                    } else {
                        throw new Error('无效的响应数据');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    if (!error.message.includes('已在其他地方登录') && 
                        !error.message.includes('认证失败')) {
                        showAlert('操作失败，请重试');
                    }
                });
        });

        // 注册表单提交
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
                .then(response => {
                    if (response.status === 200) {
                        showAlert('注册成功！');

                        // 将注册的用户名和密码填充到登录输入框
                        document.getElementById('login-username').value = username;
                        document.getElementById('login-password').value = password;

                        setTimeout(showLogin, 1000); // 1秒后回到登录界面
                    } else if (response.status === 409) {
                        alert('用户名已被注册，请重新输入！');
                    }
                })
                .catch(error => console.error('注册错误:', error));
        });

    </script>
</body>

</html>
